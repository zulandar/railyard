version: "2"
linters:
  disable:
    - errcheck
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - staticcheck
        path: _test\.go
      - linters:
          - staticcheck
        text: SA9003
      # ST1005: capitalized error strings are intentional for user-facing errors.
      - linters:
          - staticcheck
        text: ST1005
      # QF1012: WriteString(Sprintf(...)) is fine for table formatting.
      - linters:
          - staticcheck
        text: QF1012
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 50
  max-same-issues: 5
formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
