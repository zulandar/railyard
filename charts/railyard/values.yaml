# Railyard Helm chart values
#
# This chart deploys a complete Railyard instance: Dolt, pgvector,
# dispatch, yardmaster, dashboard, engine pods, and optionally Telegraph.

# -- Project name used for namespace derivation and resource naming.
project: ""

# -- Git repository settings.
git:
  owner: ""
  repo: ""
  defaultBranch: main

# ---------------------------------------------------------------------------
# Container image
# ---------------------------------------------------------------------------
image:
  repository: ghcr.io/zulandar/railyard/engine
  # Tag defaults to .Chart.AppVersion. Provider-specific images are published
  # with a suffix: e.g. "0.6.0-codex", "0.6.0-gemini", "0.6.0-opencode".
  # The unqualified tag (e.g. "0.6.0") is the claude variant.
  tag: ""
  pullPolicy: IfNotPresent

# -- Name of an existing image pull secret.
imagePullSecret: ""

# -- Service account name. Created if serviceAccount.create is true.
serviceAccount:
  create: true
  name: ""
  annotations: {}

# ---------------------------------------------------------------------------
# Dolt database
# ---------------------------------------------------------------------------
dolt:
  # -- Deploy Dolt as a StatefulSet inside the cluster.
  internal: true
  # -- Connection settings (used whether internal or external).
  host: ""       # auto-derived when internal=true
  port: 3306
  database: ""   # default: railyard_{project}
  username: root
  password: ""
  tls:
    enabled: false
    caSecret: ""       # secret name containing ca.crt
    clientSecret: ""   # secret name containing tls.crt + tls.key
    skipVerify: false
  # -- Storage settings for the internal StatefulSet.
  storage:
    size: 10Gi
    storageClass: ""
  # -- Resource requests/limits for the internal Dolt pod.
  resources: {}

# ---------------------------------------------------------------------------
# pgvector (PostgreSQL + pgvector for CocoIndex)
# ---------------------------------------------------------------------------
pgvector:
  # -- Deploy pgvector as a StatefulSet inside the cluster.
  internal: true
  # -- Connection settings (used whether internal or external).
  host: ""       # auto-derived when internal=true
  port: 5432
  database: cocoindex
  username: cocoindex
  password: cocoindex
  # -- PostgreSQL sslmode for client connections (prefer, require, verify-ca, verify-full).
  sslmode: prefer
  # -- Storage settings for the internal StatefulSet.
  storage:
    size: 10Gi
    storageClass: ""
  # -- Resource requests/limits for the internal pgvector pod.
  resources: {}

# ---------------------------------------------------------------------------
# Agent authentication
# ---------------------------------------------------------------------------
# Configures credentials for the AI agent provider used by engines.
#
# Methods:
#   api_key      - ANTHROPIC_API_KEY (claude), OPENAI_API_KEY (codex),
#                  GEMINI_API_KEY (gemini). Simplest for headless/CI.
#   oauth_token  - CLAUDE_CODE_OAUTH_TOKEN from 'claude setup-token'.
#                  Uses Max plan subscription budget (no pay-per-token).
#                  Mounts ~/.claude.json with hasCompletedOnboarding:true.
#   bedrock      - AWS Bedrock: uses AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
#                  AWS_REGION. No browser login needed.
#   vertex       - Google Vertex AI: uses GOOGLE_APPLICATION_CREDENTIALS
#                  (service account JSON) and CLOUD_ML_REGION.
#   foundry      - Azure AI Foundry: uses AZURE_API_KEY and AZURE_ENDPOINT.
auth:
  # -- Authentication method: api_key, oauth_token, bedrock, vertex, foundry.
  method: api_key
  # -- Use an existing Secret instead of creating one. The Secret must contain
  # the appropriate keys for the chosen method (see auth-secret.yaml template).
  existingSecret: ""
  # -- API key (used when method=api_key).
  # Set the key for your provider: ANTHROPIC_API_KEY, OPENAI_API_KEY, etc.
  apiKey: ""
  # -- OAuth token from 'claude setup-token' (used when method=oauth_token).
  oauthToken: ""
  # -- AWS Bedrock configuration (used when method=bedrock).
  bedrock:
    accessKeyID: ""
    secretAccessKey: ""
    region: us-east-1
  # -- Google Vertex AI configuration (used when method=vertex).
  vertex:
    projectID: ""
    region: us-central1
    # -- Name of an existing Secret containing the service account JSON
    # key in a 'credentials.json' key.
    credentialsSecret: ""
  # -- Azure AI Foundry configuration (used when method=foundry).
  foundry:
    apiKey: ""
    endpoint: ""
  # -- GitHub PAT for PR operations (require_pr mode). Needs repo scope.
  # Sets GH_TOKEN env var used by gh CLI for PR creation and review detection.
  githubToken: ""
  # -- Advanced: apiKeyHelper command for dynamic key rotation (e.g. Vault).
  # When set, ANTHROPIC_API_KEY_HELPER is set to this value.
  apiKeyHelper: ""

# ---------------------------------------------------------------------------
# Tracks
# ---------------------------------------------------------------------------
# Each track defines an area of concern with its own engine pool.
tracks:
  - name: backend
    engineSlots: 3
    minReplicas: 1
    maxReplicas: 3
    language: go
    testCommand: "go test ./..."

# ---------------------------------------------------------------------------
# Engine pods
# ---------------------------------------------------------------------------
engine:
  # -- Agent provider: claude, codex, gemini, opencode.
  agentProvider: claude
  # -- Resource requests/limits per engine pod.
  resources: {}
  # -- Node selector for engine pods.
  nodeSelector: {}
  # -- Tolerations for engine pods.
  tolerations: []
  # -- Affinity rules for engine pods.
  affinity: {}
  # -- Extra environment variables for engine pods.
  extraEnv: []

# ---------------------------------------------------------------------------
# Dispatch
# ---------------------------------------------------------------------------
dispatch:
  replicas: 1
  resources: {}

# ---------------------------------------------------------------------------
# Yardmaster
# ---------------------------------------------------------------------------
yardmaster:
  replicas: 1
  resources: {}

# ---------------------------------------------------------------------------
# Dashboard
# ---------------------------------------------------------------------------
dashboard:
  replicas: 1
  resources: {}
  service:
    type: ClusterIP
    port: 8080
  ingress:
    enabled: false
    className: ""
    host: ""
    annotations: {}
    tls: []
  # -- Per-IP rate limiting for dashboard routes.
  rateLimit:
    enabled: false
    requestsPerMinute: 120
  # -- OAuth2 Proxy sidecar for dashboard authentication.
  oauth2proxy:
    enabled: false
    image:
      repository: quay.io/oauth2-proxy/oauth2-proxy
      tag: "v7.6.0"
    provider: github
    clientID: ""
    clientSecret: ""
    cookieSecret: ""
    extraArgs: []

# ---------------------------------------------------------------------------
# Telegraph (chat bridge — Slack or Discord)
# ---------------------------------------------------------------------------
telegraph:
  enabled: false
  replicas: 1
  resources: {}
  platform: slack   # slack or discord
  channel: ""
  slack:
    botToken: ""    # or reference a secret
    appToken: ""
  discord:
    botToken: ""
    guildID: ""
    channelID: ""

# ---------------------------------------------------------------------------
# Bull (GitHub issue triage daemon)
# ---------------------------------------------------------------------------
bull:
  enabled: false
  replicas: 1
  resources: {}
  # -- Poll interval in seconds for checking new GitHub issues.
  pollIntervalSec: 60
  # -- Triage mode: "standard" (heuristic + AI) or "full" (AI for all issues).
  triageMode: standard
  # -- GitHub token for Bull. If empty, falls back to auth.githubToken.
  githubToken: ""
  # -- Issue commenting configuration.
  comments:
    enabled: false
    answerQuestions: false
  # -- Custom label names (defaults shown).
  labels:
    underReview: "bull: under review"
    inProgress: "bull: in progress"
    fixMerged: "bull: fix merged"
    ignore: "bull: ignore"
