apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "railyard.fullname" . }}-yardmaster
  labels:
    {{- include "railyard.labels" . | nindent 4 }}
    app.kubernetes.io/component: yardmaster
spec:
  replicas: {{ .Values.yardmaster.replicas }}
  selector:
    matchLabels:
      {{- include "railyard.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: yardmaster
  template:
    metadata:
      labels:
        {{- include "railyard.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: yardmaster
    spec:
      serviceAccountName: {{ include "railyard.serviceAccountName" . }}
      {{- if .Values.imagePullSecret }}
      imagePullSecrets:
        - name: {{ .Values.imagePullSecret }}
      {{- end }}
      initContainers:
        - name: git-clone
          image: {{ include "railyard.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["sh", "-c"]
          args:
            - |
              git config --global --add safe.directory /repo
              {{- if or .Values.auth.githubToken .Values.bull.githubToken .Values.auth.existingSecret }}
              if [ -n "${GITHUB_TOKEN:-}" ]; then
                git config --global credential.helper '!f() { echo "username=x-access-token"; echo "password=${GITHUB_TOKEN}"; }; f'
              fi
              {{- end }}
              if [ -d /repo/.git ]; then
                cd /repo && git fetch --all
              else
                rm -rf /repo/* /repo/.[!.]* 2>/dev/null
                git clone {{ .Values.git.repo }} /repo
              fi
              cd /repo &&
              git config user.name "railyard" &&
              git config user.email "railyard@railyard.dev"
              {{- if or .Values.auth.githubToken .Values.bull.githubToken .Values.auth.existingSecret }}
              if [ -n "${GITHUB_TOKEN:-}" ]; then
                git config credential.helper '!f() { echo "username=x-access-token"; echo "password=${GITHUB_TOKEN}"; }; f'
              fi
              {{- end }}
          {{- if or .Values.auth.githubToken .Values.bull.githubToken .Values.auth.existingSecret }}
          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "railyard.authSecretName" . }}
                  key: GH_TOKEN
                  optional: true
          {{- end }}
          volumeMounts:
            - name: repo
              mountPath: /repo
      containers:
        - name: yardmaster
          image: {{ include "railyard.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["ry"]
          args: ["yardmaster", "-c", "/etc/railyard/railyard.yaml"]
          workingDir: /repo
          env:
            - name: GIT_CONFIG_COUNT
              value: "1"
            - name: GIT_CONFIG_KEY_0
              value: safe.directory
            - name: GIT_CONFIG_VALUE_0
              value: /repo
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "railyard.fullname" . }}-db
                  key: db-password
            - name: PGVECTOR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "railyard.fullname" . }}-db
                  key: pgvector-password
            {{- if or .Values.auth.githubToken .Values.bull.githubToken .Values.auth.existingSecret }}
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "railyard.authSecretName" . }}
                  key: GH_TOKEN
                  optional: true
            {{- end }}
            {{- include "railyard.authExtraEnv" . | nindent 12 }}
          envFrom:
            {{- include "railyard.authEnvFrom" . | nindent 12 }}
          ports:
            - name: health
              containerPort: {{ .Values.yardmaster.healthPort | default 8081 }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/railyard
              readOnly: true
            - name: repo
              mountPath: /repo
            {{- include "railyard.authVolumeMounts" . | nindent 12 }}
          {{- with .Values.yardmaster.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "railyard.fullname" . }}-config
            defaultMode: 0644
        - name: repo
          emptyDir: {}
        {{- include "railyard.authVolumes" . | nindent 8 }}
