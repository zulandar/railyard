{{- if not .Values.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "railyard.fullname" . }}-auth
  labels:
    {{- include "railyard.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if eq .Values.auth.method "api_key" }}
  {{- if eq .Values.engine.agentProvider "claude" }}
  ANTHROPIC_API_KEY: {{ .Values.auth.apiKey | quote }}
  {{- else if eq .Values.engine.agentProvider "codex" }}
  OPENAI_API_KEY: {{ .Values.auth.apiKey | quote }}
  {{- else if eq .Values.engine.agentProvider "gemini" }}
  GEMINI_API_KEY: {{ .Values.auth.apiKey | quote }}
  {{- end }}
  {{- end }}
  {{- if eq .Values.auth.method "oauth_token" }}
  CLAUDE_CODE_OAUTH_TOKEN: {{ .Values.auth.oauthToken | quote }}
  {{- end }}
  {{- if eq .Values.auth.method "bedrock" }}
  AWS_ACCESS_KEY_ID: {{ .Values.auth.bedrock.accessKeyID | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.auth.bedrock.secretAccessKey | quote }}
  AWS_REGION: {{ .Values.auth.bedrock.region | quote }}
  {{- end }}
  {{- if eq .Values.auth.method "vertex" }}
  CLOUD_ML_REGION: {{ .Values.auth.vertex.region | quote }}
  GOOGLE_CLOUD_PROJECT: {{ .Values.auth.vertex.projectID | quote }}
  {{- end }}
  {{- if eq .Values.auth.method "foundry" }}
  AZURE_API_KEY: {{ .Values.auth.foundry.apiKey | quote }}
  AZURE_ENDPOINT: {{ .Values.auth.foundry.endpoint | quote }}
  {{- end }}
  {{- if eq .Values.auth.method "do_inference" }}
  ANTHROPIC_BASE_URL: {{ "https://inference.do-ai.run" | quote }}
  ANTHROPIC_API_KEY: {{ required "auth.doInference.apiKey is required when auth.method is do_inference" .Values.auth.doInference.apiKey | quote }}
  {{- end }}
  {{- if eq .Values.auth.method "openrouter" }}
  {{- /* Approach A (native loop): Railyard's own loop talks to OpenRouter's
         OpenAI-compatible endpoint. Credentials are resolved from the env. */}}
  OPENROUTER_API_KEY: {{ required "auth.openrouter.apiKey is required when auth.method is openrouter" .Values.auth.openrouter.apiKey | quote }}
  {{- if .Values.auth.openrouter.baseURL }}
  OPENROUTER_BASE_URL: {{ .Values.auth.openrouter.baseURL | quote }}
  {{- end }}
  {{- end }}
  {{- if eq .Values.auth.method "openrouter_skin" }}
  {{- /* Approach B (capable models only): the claude CLI talks to OpenRouter's
         Anthropic skin. The Anthropic client appends /v1/messages, reaching
         https://openrouter.ai/api/v1/messages. Requires agent_provider=claude. */}}
  ANTHROPIC_BASE_URL: {{ "https://openrouter.ai/api" | quote }}
  ANTHROPIC_API_KEY: {{ required "auth.openrouter.apiKey is required when auth.method is openrouter_skin" .Values.auth.openrouter.apiKey | quote }}
  {{- end }}
  {{- if eq .Values.auth.method "openai_compat" }}
  {{- /* Approach A (native loop) for any OpenAI-compatible backend. The loop
         needs both the key and the base URL from the env. */}}
  OPENAI_API_KEY: {{ required "auth.openaiCompat.apiKey is required when auth.method is openai_compat" .Values.auth.openaiCompat.apiKey | quote }}
  OPENAI_BASE_URL: {{ required "auth.openaiCompat.baseURL is required when auth.method is openai_compat" .Values.auth.openaiCompat.baseURL | quote }}
  {{- end }}
  {{- if .Values.auth.apiKeyHelper }}
  ANTHROPIC_API_KEY_HELPER: {{ .Values.auth.apiKeyHelper | quote }}
  {{- end }}
  {{- if or .Values.auth.githubToken .Values.bull.githubToken }}
  GH_TOKEN: {{ .Values.auth.githubToken | default .Values.bull.githubToken | quote }}
  {{- end }}
  {{- if and .Values.auth.copilot .Values.auth.copilot.token (ne .Values.auth.copilot.token "") }}
  GITHUB_COPILOT_TOKEN: {{ .Values.auth.copilot.token | quote }}
  {{- end }}
  {{- if .Values.telegraph.enabled }}
  {{- if eq .Values.telegraph.platform "discord" }}
  DISCORD_BOT_TOKEN: {{ .Values.telegraph.discord.botToken | quote }}
  {{- end }}
  {{- if eq .Values.telegraph.platform "slack" }}
  SLACK_BOT_TOKEN: {{ .Values.telegraph.slack.botToken | quote }}
  SLACK_APP_TOKEN: {{ .Values.telegraph.slack.appToken | quote }}
  {{- end }}
  {{- end }}
{{- end }}
