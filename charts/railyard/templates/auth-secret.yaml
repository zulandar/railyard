{{- if not .Values.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "railyard.fullname" . }}-auth
  labels:
    {{- include "railyard.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if eq .Values.auth.method "api_key" }}
  {{- if eq .Values.engine.agentProvider "claude" }}
  ANTHROPIC_API_KEY: {{ .Values.auth.apiKey | quote }}
  {{- else if eq .Values.engine.agentProvider "codex" }}
  OPENAI_API_KEY: {{ .Values.auth.apiKey | quote }}
  {{- else if eq .Values.engine.agentProvider "gemini" }}
  GEMINI_API_KEY: {{ .Values.auth.apiKey | quote }}
  {{- else if eq .Values.engine.agentProvider "opencode" }}
  ANTHROPIC_API_KEY: {{ .Values.auth.apiKey | quote }}
  {{- end }}
  {{- end }}
  {{- if eq .Values.auth.method "oauth_token" }}
  CLAUDE_CODE_OAUTH_TOKEN: {{ .Values.auth.oauthToken | quote }}
  {{- end }}
  {{- if eq .Values.auth.method "bedrock" }}
  AWS_ACCESS_KEY_ID: {{ .Values.auth.bedrock.accessKeyID | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.auth.bedrock.secretAccessKey | quote }}
  AWS_REGION: {{ .Values.auth.bedrock.region | quote }}
  {{- end }}
  {{- if eq .Values.auth.method "vertex" }}
  CLOUD_ML_REGION: {{ .Values.auth.vertex.region | quote }}
  GOOGLE_CLOUD_PROJECT: {{ .Values.auth.vertex.projectID | quote }}
  {{- end }}
  {{- if eq .Values.auth.method "foundry" }}
  AZURE_API_KEY: {{ .Values.auth.foundry.apiKey | quote }}
  AZURE_ENDPOINT: {{ .Values.auth.foundry.endpoint | quote }}
  {{- end }}
  {{- if .Values.auth.apiKeyHelper }}
  ANTHROPIC_API_KEY_HELPER: {{ .Values.auth.apiKeyHelper | quote }}
  {{- end }}
  {{- if .Values.auth.githubToken }}
  GH_TOKEN: {{ .Values.auth.githubToken | quote }}
  {{- end }}
  {{- if and .Values.auth.copilot .Values.auth.copilot.token (ne .Values.auth.copilot.token "") }}
  GITHUB_COPILOT_TOKEN: {{ .Values.auth.copilot.token | quote }}
  {{- end }}
{{- end }}
