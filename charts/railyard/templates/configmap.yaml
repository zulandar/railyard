apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "railyard.fullname" . }}-config
  labels:
    {{- include "railyard.labels" . | nindent 4 }}
data:
  railyard.yaml: |
    owner: {{ .Values.git.owner | quote }}
    repo: {{ .Values.git.repo | quote }}
    {{- if .Values.project }}
    project: {{ .Values.project | quote }}
    {{- end }}
    default_branch: {{ .Values.git.defaultBranch | quote }}
    require_pr: {{ .Values.requirePR | default false }}
    agent_provider: {{ .Values.engine.agentProvider | quote }}
    {{- if .Values.dashboardURL }}
    dashboard_url: {{ .Values.dashboardURL | quote }}
    {{- else if and .Values.dashboard.ingress.enabled .Values.dashboard.ingress.host }}
    dashboard_url: "https://{{ .Values.dashboard.ingress.host }}"
    {{- end }}

    database:
      host: {{ include "railyard.dbHost" . | quote }}
      port: {{ .Values.database.port }}
      database: {{ include "railyard.dbDatabase" . | quote }}
      username: {{ .Values.database.username | quote }}
      password: ${DB_PASSWORD}
      {{- if .Values.database.tls.enabled }}
      tls:
        enabled: true
        skip_verify: {{ .Values.database.tls.skipVerify }}
      {{- end }}

    {{- if or .Values.pgvector.internal .Values.pgvector.host }}
    cocoindex:
      database_url: "postgresql://{{ .Values.pgvector.username }}:${PGVECTOR_PASSWORD}@{{ include "railyard.pgvectorHost" . }}:{{ .Values.pgvector.port }}/{{ .Values.pgvector.database }}?sslmode={{ .Values.pgvector.sslmode | default "prefer" }}"
      venv_path: "/opt/railyard/cocoindex/.venv"
      scripts_path: "/opt/railyard/cocoindex"
    {{- end }}

    tracks:
    {{- range .Values.tracks }}
      - name: {{ .name | quote }}
        language: {{ .language | quote }}
        engine_slots: {{ .engineSlots | default 3 }}
        {{- if .testCommand }}
        test_command: {{ .testCommand | quote }}
        {{- end }}
        {{- if .preTestCommand }}
        pre_test_command: {{ .preTestCommand | quote }}
        {{- end }}
        {{- if .filePatterns }}
        file_patterns:
        {{- range .filePatterns }}
          - {{ . | quote }}
        {{- end }}
        {{- end }}
        {{- if .agentProvider }}
        agent_provider: {{ .agentProvider | quote }}
        {{- end }}
    {{- end }}

    stall:
      stdout_timeout_sec: {{ .Values.stall.stdoutTimeoutSec }}
      repeated_error_max: {{ .Values.stall.repeatedErrorMax }}
      max_clear_cycles: {{ .Values.stall.maxClearCycles }}
      max_switch_failures: {{ .Values.stall.maxSwitchFailures }}
      switch_timeout_sec: {{ .Values.stall.switchTimeoutSec }}
      escalation_cooldown_sec: {{ .Values.stall.escalationCooldownSec }}
      max_concurrent_escalations: {{ .Values.stall.maxConcurrentEscalations }}
      stale_engine_threshold_sec: {{ .Values.stall.staleEngineThresholdSec }}

    yardmaster:
      health_port: {{ .Values.yardmaster.healthPort | default 8081 }}
      auto_merge_on_approval: {{ .Values.yardmaster.autoMergeOnApproval | default false }}
      rework_label: {{ .Values.yardmaster.reworkLabel | default "railyard: rework" | quote }}
      revised_label: {{ .Values.yardmaster.revisedLabel | default "railyard: revised" | quote }}

    {{- if .Values.telegraph.enabled }}
    telegraph:
      platform: {{ .Values.telegraph.platform | quote }}
      channel: {{ .Values.telegraph.channel | quote }}
      {{- if .Values.telegraph.allowedChannels }}
      allowed_channels:
        {{- range .Values.telegraph.allowedChannels }}
        - {{ . | quote }}
        {{- end }}
      {{- end }}
      process_timeout_sec: {{ .Values.telegraph.processTimeoutSec | default 900 }}
      health_port: {{ .Values.telegraph.healthPort | default 8086 }}
      {{- if eq .Values.telegraph.platform "slack" }}
      slack:
        bot_token: ${SLACK_BOT_TOKEN}
        app_token: ${SLACK_APP_TOKEN}
      {{- end }}
      {{- if eq .Values.telegraph.platform "discord" }}
      discord:
        bot_token: ${DISCORD_BOT_TOKEN}
        {{- if .Values.telegraph.discord.guildID }}
        guild_id: {{ .Values.telegraph.discord.guildID | quote }}
        {{- end }}
        {{- if .Values.telegraph.discord.channelID }}
        channel_id: {{ .Values.telegraph.discord.channelID | quote }}
        {{- end }}
      {{- end }}
    {{- end }}

    {{- if .Values.inspect.enabled }}
    inspect:
      enabled: true
      app_id: {{ .Values.inspect.appID }}
      private_key_path: /etc/railyard-keys/inspect-app.pem
      installation_id: {{ .Values.inspect.installationID }}
      poll_interval_sec: {{ .Values.inspect.pollIntervalSec | default 60 }}
      {{- if .Values.inspect.agentProvider }}
      agent_provider: {{ .Values.inspect.agentProvider | quote }}
      {{- end }}
      deep_review: {{ .Values.inspect.deepReview | default false }}
      review_timeout_sec: {{ .Values.inspect.reviewTimeoutSec | default 300 }}
      max_diff_lines: {{ .Values.inspect.maxDiffLines | default 10000 }}
      health_port: {{ .Values.inspect.healthPort | default 8082 }}
      labels:
        in_progress: {{ .Values.inspect.labels.inProgress | quote }}
        reviewed: {{ .Values.inspect.labels.reviewed | quote }}
        re_review: {{ .Values.inspect.labels.reReview | quote }}
    {{- end }}

    {{- if .Values.bull.enabled }}
    bull:
      enabled: true
      {{- if .Values.bull.appID }}
      app_id: {{ .Values.bull.appID }}
      private_key_path: /etc/railyard-keys/github-app.pem
      installation_id: {{ .Values.bull.installationID }}
      {{- else if or .Values.auth.githubToken .Values.bull.githubToken .Values.auth.existingSecret }}
      github_token: ${GITHUB_TOKEN}
      {{- end }}
      poll_interval_sec: {{ .Values.bull.pollIntervalSec | default 60 }}
      triage_mode: {{ .Values.bull.triageMode | default "standard" | quote }}
      comments:
        enabled: {{ .Values.bull.comments.enabled }}
        answer_questions: {{ .Values.bull.comments.answerQuestions }}
      labels:
        under_review: {{ .Values.bull.labels.underReview | quote }}
        in_progress: {{ .Values.bull.labels.inProgress | quote }}
        fix_merged: {{ .Values.bull.labels.fixMerged | quote }}
        ignore: {{ .Values.bull.labels.ignore | quote }}
    {{- end }}
