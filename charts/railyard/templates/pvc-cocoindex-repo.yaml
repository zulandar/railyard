{{- if and (or .Values.pgvector.internal .Values.pgvector.host) .Values.cocoindex.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "railyard.fullname" . }}-cocoindex-repo
  labels:
    {{- include "railyard.labels" . | nindent 4 }}
    app.kubernetes.io/component: cocoindex-index
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.cocoindex.persistence.storageClass }}
  storageClassName: {{ .Values.cocoindex.persistence.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.cocoindex.persistence.size }}
{{- end }}
