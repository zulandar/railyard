{{- $fullname := include "railyard.fullname" . -}}
{{- range .Values.tracks }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-engine-{{ .name }}
  labels:
    {{- include "railyard.labels" $ | nindent 4 }}
    app.kubernetes.io/component: engine
    railyard.dev/track: {{ .name }}
spec:
  replicas: {{ .minReplicas | default 1 }}
  selector:
    matchLabels:
      {{- include "railyard.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: engine
      railyard.dev/track: {{ .name }}
  template:
    metadata:
      labels:
        {{- include "railyard.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: engine
        railyard.dev/track: {{ .name }}
    spec:
      serviceAccountName: {{ include "railyard.serviceAccountName" $ }}
      {{- if $.Values.imagePullSecret }}
      imagePullSecrets:
        - name: {{ $.Values.imagePullSecret }}
      {{- end }}
      terminationGracePeriodSeconds: 300
      initContainers:
        - name: git-clone
          image: {{ include "railyard.image" $ }}
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          command: ["sh", "-c"]
          args:
            - |
              git config --global --add safe.directory /repo
              {{- if or $.Values.auth.githubToken $.Values.bull.githubToken $.Values.auth.existingSecret }}
              if [ -n "${GITHUB_TOKEN:-}" ]; then
                git config --global credential.helper '!f() { echo "username=x-access-token"; echo "password=${GITHUB_TOKEN}"; }; f'
              fi
              {{- end }}
              if [ -d /repo/.git ]; then
                cd /repo && git fetch --all
              else
                rm -rf /repo/* /repo/.[!.]* 2>/dev/null
                git clone {{ $.Values.git.repo }} /repo
              fi
              cd /repo &&
              git config user.name "railyard" &&
              git config user.email "railyard@railyard.dev"
              {{- if or $.Values.auth.githubToken $.Values.bull.githubToken $.Values.auth.existingSecret }}
              if [ -n "${GITHUB_TOKEN:-}" ]; then
                git config credential.helper '!f() { echo "username=x-access-token"; echo "password=${GITHUB_TOKEN}"; }; f'
              fi
              {{- end }}
              cp /etc/railyard/railyard.yaml /repo/railyard.yaml 2>/dev/null || true
          {{- if or $.Values.auth.githubToken $.Values.bull.githubToken $.Values.auth.existingSecret }}
          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "railyard.authSecretName" $ }}
                  key: GH_TOKEN
                  optional: true
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/railyard
              readOnly: true
            - name: repo
              mountPath: /repo
        {{- if or $.Values.pgvector.internal $.Values.pgvector.host }}
        - name: cocoindex-migrate
          image: {{ include "railyard.image" $ }}
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          command: ["bash", "-c"]
          args:
            - |
              source /opt/railyard/cocoindex/.venv/bin/activate
              python3 /opt/railyard/cocoindex/migrate.py \
                --database-url "postgresql://{{ $.Values.pgvector.username }}:${PGVECTOR_PASSWORD}@{{ include "railyard.pgvectorHost" $ }}:{{ $.Values.pgvector.port }}/{{ $.Values.pgvector.database }}?sslmode={{ $.Values.pgvector.sslmode | default "prefer" }}"
          env:
            - name: PGVECTOR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-db
                  key: pgvector-password
        {{- end }}
        {{- include "railyard.authInitContainers" $ | nindent 8 }}
      containers:
        - name: engine
          image: {{ include "railyard.trackImage" (dict "track" . "global" $) }}
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          command: ["tini", "--", "ry"]
          args: ["engine", "start", "--track", {{ .name | quote }}, "-c", "/etc/railyard/railyard.yaml"]
          workingDir: /repo
          env:
            - name: GIT_CONFIG_COUNT
              value: "1"
            - name: GIT_CONFIG_KEY_0
              value: safe.directory
            - name: GIT_CONFIG_VALUE_0
              value: /repo
            {{- if $.Values.logLevel }}
            - name: LOG_LEVEL
              value: {{ $.Values.logLevel | quote }}
            {{- end }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-db
                  key: db-password
            - name: PGVECTOR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-db
                  key: pgvector-password
            {{- if or $.Values.auth.githubToken $.Values.bull.githubToken $.Values.auth.existingSecret }}
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "railyard.authSecretName" $ }}
                  key: GH_TOKEN
                  optional: true
            {{- end }}
            {{- include "railyard.authExtraEnv" $ | nindent 12 }}
            {{- with $.Values.engine.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          envFrom:
            {{- include "railyard.authEnvFrom" $ | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/railyard
              readOnly: true
            - name: repo
              mountPath: /repo
            {{- include "railyard.authVolumeMounts" $ | nindent 12 }}
          {{- with $.Values.engine.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          lifecycle:
            preStop:
              exec:
                command: ["ry", "engine", "drain"]
      volumes:
        - name: config
          configMap:
            name: {{ $fullname }}-config
            defaultMode: 0644
        - name: repo
          emptyDir: {}
        {{- include "railyard.authVolumes" $ | nindent 8 }}
      {{- with $.Values.engine.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.engine.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.engine.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
