# ---------------------------------------------------------------------------
# Telegraph chat bridge (optional — Slack or Discord)
# ---------------------------------------------------------------------------
#
# Connects Railyard to a chat platform for command routing, event
# notifications, dispatch via @mention, and scheduled digests.
# See docs/telegraph-setup.md for full setup instructions.
#
# telegraph:
#   platform: slack                    # "slack" or "discord"
#   channel: C0123456789               # default channel ID
#   process_timeout_sec: 900           # max seconds a dispatch subprocess may run (default: 900)
#   allowed_channels:                  # restrict bot to these channels (omit for all)
#     - C0123456789
#     - C9876543210
#   slack:
#     bot_token: ${SLACK_BOT_TOKEN}    # xoxb-... bot token
#     app_token: ${SLACK_APP_TOKEN}    # xapp-... app-level token (Socket Mode)
#   # discord:
#   #   bot_token: ${DISCORD_BOT_TOKEN}
#   #   guild_id: "123456789"
#   #   channel_id: "123456789"
#   events:
#     car_lifecycle: true              # post car status changes (default: true)
#     engine_stalls: true              # post stall alerts (default: true)
#     escalations: true                # post escalation messages (default: true)
#     poll_interval_sec: 15            # event poll interval (default: 15)
#   digest:
#     daily:
#       enabled: true
#       cron: "0 9 * * *"             # 9am daily
#     weekly:
#       enabled: true
#       cron: "0 9 * * 1"             # 9am Monday
#   dispatch_lock:
#     heartbeat_interval_sec: 30       # session heartbeat interval (default: 30)
#     heartbeat_timeout_sec: 90        # stale heartbeat threshold (default: 90)
#     queue_max: 5                     # max queued dispatch requests (default: 5)
#   conversations:
#     max_turns: 20                    # max turns per dispatch conversation (default: 20)
#     recovery_lookback_days: 7        # days to look back for session recovery (default: 7)

# ---------------------------------------------------------------------------
# Bull — GitHub issue triage daemon (optional)
# ---------------------------------------------------------------------------
#
# Bull monitors GitHub Issues and automatically triages them using AI.
# Accepted issues become Railyard cars; rejected issues get labeled.
# See docs/bull-setup.md for full setup instructions.
#
# bull:
#   enabled: true
#   github_token: ${GITHUB_TOKEN}       # Alternative to GitHub App auth — PAT with repo scope (or public_repo for public repos)
#   # GitHub App authentication (recommended over PAT)
#   # app_id: 123456
#   # installation_id: 78901234
#   # private_key_path: /secrets/bull-private-key.pem  # path to mounted PEM file
#   poll_interval_sec: 60               # How often to poll GitHub for new issues (default: 60)
#   triage_mode: standard               # "standard" (heuristic + AI) or "full" (AI for all)
#   agent_provider: claude              # override global agent_provider for triage (default: global)
#   comments:
#     enabled: true                     # Post comments on rejected issues (default: false)
#     answer_questions: true            # Answer questions detected in issues (default: false)
#   labels:
#     under_review: "bull: under review"  # Applied during triage (default)
#     in_progress: "bull: in progress"    # Applied when car is claimed by engine (default)
#     fix_merged: "bull: fix merged"      # Applied when car's branch is merged (default)
#     ignore: "bull: ignore"              # Applied to rejected issues / manually ignored (default)
