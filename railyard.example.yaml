  # - name: mobile
  #   language: swift
  #   file_patterns: ["ios/**", "*.swift"]
  #   engine_slots: 2
  #   test_command: "xcodebuild test -scheme MyApp"
  #   conventions:
  #     min_ios: "17.0"
