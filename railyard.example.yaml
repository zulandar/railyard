# Railyard configuration template
#
# Copy this file to railyard.yaml and edit to match your project.
#
# Quick start:
#   cp railyard.example.yaml railyard.yaml
#   ry db init -c railyard.yaml
#   ry start -c railyard.yaml --engines 2

# ---------------------------------------------------------------------------
# Required
# ---------------------------------------------------------------------------

# Your name or username — used to derive branch prefixes and DB name.
owner: yourname

# Git remote URL for your project.
repo: git@github.com:org/myproject.git

# Project name for multi-project Kubernetes deployments (optional).
# When set, branch_prefix defaults to "ry" and namespace to "railyard-{project}".
# project: myproject

# ---------------------------------------------------------------------------
# Optional — general settings
# ---------------------------------------------------------------------------

# Branch prefix for Railyard-managed branches (default: ry/{owner}).
# branch_prefix: ry/yourname

# Base branch for new cars. When omitted, Railyard auto-detects using:
#   1. Current branch of the primary repo (git symbolic-ref HEAD)
#   2. Remote default branch (origin/HEAD)
#   3. Fallback: 'main'
# Set this explicitly if your repo uses a non-standard default branch
# (e.g. develop, trunk) and you want all cars to target it regardless
# of which branch is currently checked out.
# default_branch: main

# Default acceptance criteria appended to every new car if the car doesn't
# define its own. Useful for org-wide standards like "all tests pass".
# default_acceptance: "All tests pass. No lint warnings."

# When true, completed cars create draft PRs instead of merging directly
# to main. The PR includes a rich description with summary, acceptance
# criteria, design notes, diff stats, and progress notes.
# require_pr: false
#
# Prerequisites when require_pr is true:
#   - gh CLI installed (https://cli.github.com/)
#   - GitHub PAT with repo scope — set GH_TOKEN env var or run `gh auth login`
#   - In Kubernetes: set auth.githubToken in Helm values

# Git attribution: Engine commits include a Co-Authored-By trailer
# (e.g. "Co-Authored-By: Railyard Engine eng-abc123 <railyard-engine@noreply>")
# so you can distinguish engine work from human commits on GitHub.
# Yardmaster merge commits similarly include a Railyard Yardmaster trailer.
# Your git identity (from ~/.gitconfig or PAT) remains the commit author.

# ---------------------------------------------------------------------------
# Agent provider (optional — default: claude)
# ---------------------------------------------------------------------------

# Which AI coding CLI to use as the engine runtime.
# Supported providers: claude, codex, gemini, opencode, copilot
# This sets the global default — individual tracks can override it.
# agent_provider: claude

# ---------------------------------------------------------------------------
# Database connection (optional — defaults shown)
# ---------------------------------------------------------------------------

# database:
#   host: 127.0.0.1
#   port: 3306
#   username: root                   # default: root
#   password:                        # default: empty; supports ${ENV_VAR} syntax
#   database: railyard_yourname      # default: railyard_{owner}
#   tls:
#     enabled: false
#     ca_cert: /path/to/ca.pem         # or ${DB_TLS_CA_CERT}
#     client_cert: /path/to/client.pem # or ${DB_TLS_CLIENT_CERT}
#     client_key: /path/to/client-key.pem # or ${DB_TLS_CLIENT_KEY}
#     skip_verify: false

# ---------------------------------------------------------------------------
# Stall detection (optional — defaults shown)
# ---------------------------------------------------------------------------

# stall:
#   stdout_timeout_sec: 120          # no stdout for N seconds = engine stall
#   repeated_error_max: 3            # same error N times = engine stall
#   max_clear_cycles: 5              # more than N /clear cycles = engine stall
#   max_switch_failures: 3           # repeated switch (merge/test/push) failures before escalation
#   switch_timeout_sec: 600          # max seconds for switch/merge/test operations
#   escalation_cooldown_sec: 600     # per-car cooldown between escalations (prevents cost spikes)
#   max_concurrent_escalations: 3    # limit concurrent escalation goroutines
#   stale_engine_threshold_sec: 60   # seconds before an engine is considered stale

# ---------------------------------------------------------------------------
# Yardmaster daemon settings (optional — defaults shown)
# ---------------------------------------------------------------------------

# yardmaster:
#   health_port: 8081                # port for /healthz and /readyz k8s probes
#   auto_merge_on_approval: false    # auto-merge APPROVED PRs via gh CLI

# ---------------------------------------------------------------------------
# Car priorities (reference)
# ---------------------------------------------------------------------------
#
# Each car has a priority level (P0–P4) that controls scheduling order.
# The yardmaster picks the highest-priority ready car first.
#
# Level   Name       Description
# -----   --------   ----------------------------------------------------------
# P0      Critical   Production outage or data loss — engines preempt lower work
# P1      High       Serious bug or blocking issue — next up after P0
# P2      Medium     Standard task or non-critical fix — normal queue order
# P3      Low        Minor improvement, tech debt, or speculative spike
# P4      Trivial    Cosmetic tweaks, typos, or nice-to-haves
#
# Type-based defaults (applied when no explicit priority is set):
#   bug     → P1
#   task    → P2
#   spike   → P3
#
# Dispatch uses signal detection to auto-adjust priorities at triage time.
# For example, keywords like "outage" or "data loss" in a car's description
# may elevate its priority above the type-based default.

# ---------------------------------------------------------------------------
# Kubernetes deployment mode (optional)
# ---------------------------------------------------------------------------
# When configured, engines run as Kubernetes pods instead of tmux sessions.
#
# kubernetes:
#   namespace: railyard-myproject    # auto-derived from project if unset
#   image: ghcr.io/org/railyard-engine:latest
#   image_pull_secret: ghcr-creds   # optional
#   service_account: ""             # optional, auto-created by Helm
#   scaling:
#     min_engines: 1
#     max_engines: 10
#     scale_up_threshold: 3         # ready cars per engine triggers scale-up
#     scale_down_idle_minutes: 10   # idle time before scale-down

# ---------------------------------------------------------------------------
# Notifications (optional)
# ---------------------------------------------------------------------------

# Send desktop notifications when the yardmaster escalates to a human.
# The command is a shell template with {{.Subject}} and {{.Body}} available.
# notifications:
#   command: "notify-send 'Railyard' '{{.Subject}}: {{.Body}}'"

# ---------------------------------------------------------------------------
# Tracks — at least one is required
# ---------------------------------------------------------------------------
#
# Each track defines an area of concern. Engines are assigned to tracks and
# only work on cars belonging to their track. The yardmaster rebalances idle
# engines across tracks automatically.
#
# Fields:
#   name             (required) — unique track identifier
#   language         (required) — primary language (go, typescript, python, etc.)
#   file_patterns    (optional) — glob patterns for files this track owns
#   engine_slots     (optional) — max engines on this track (default: 3)
#   pre_test_command (optional) — shell command run before tests (e.g. "go mod vendor", "npm install")
#   test_command     (optional) — shell command to run tests (default: "go test ./...")
#   conventions      (optional) — key/value pairs injected into engine prompts

tracks:
  - name: backend
    language: go
    file_patterns: ["cmd/**", "internal/**", "pkg/**", "*.go"]
    engine_slots: 3
    test_command: "go test ./..."
    # agent_provider: claude    # override global provider for this track
    conventions:
      style: "stdlib-first, no frameworks"
      test_framework: "stdlib table-driven"

  # - name: frontend
  #   language: typescript
  #   file_patterns: ["src/**", "*.ts", "*.tsx", "*.css"]
  #   engine_slots: 2
  #   pre_test_command: "npm install"
  #   test_command: "npm test"
