name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    name: Test
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./... -count=1 -timeout 300s -race

  helm-validate:
    name: Helm Validate
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build ry binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ry ./cmd/ry/

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin kubeconform

      - name: Helm lint
        run: |
          helm lint charts/railyard
          helm lint charts/railyard -f charts/railyard/ci/test-values-full.yaml
          helm lint charts/railyard -f charts/railyard/ci/test-values-kind.yaml

      - name: Kubeconform validate
        run: |
          helm template railyard charts/railyard \
            -f charts/railyard/ci/test-values-full.yaml \
            | kubeconform -strict -kubernetes-version 1.26.0 -summary

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: railyard-release-ci
          node_image: kindest/node:v1.31.4

      - name: Build and load Docker image into Kind
        run: |
          docker build --build-arg AGENT_PROVIDER=claude -t railyard-engine:ci -f Dockerfile.engine .
          kind load docker-image railyard-engine:ci --name railyard-release-ci

      - name: Install Helm chart
        run: |
          helm install railyard charts/railyard \
            --namespace railyard --create-namespace \
            -f charts/railyard/ci/test-values-kind.yaml \
            --wait-for-jobs \
            --timeout 3m

      - name: Verify infrastructure pods
        run: |
          kubectl rollout status statefulset/railyard-mysql -n railyard --timeout=120s
          kubectl rollout status statefulset/railyard-pgvector -n railyard --timeout=120s

      - name: Wait for dashboard (may CrashLoopBackOff until DB is ready)
        run: |
          kubectl wait --for=condition=available deployment/railyard-dashboard \
            -n railyard --timeout=180s

      - name: Run database migration
        run: |
          kubectl exec deploy/railyard-dashboard -n railyard -- \
            ry db init -c /etc/railyard/railyard.yaml

      - name: Verify app pods
        run: |
          kubectl wait --for=condition=available deployment/railyard-dashboard \
            -n railyard --timeout=120s
          kubectl wait --for=condition=available deployment/railyard-dispatch \
            -n railyard --timeout=120s
          kubectl wait --for=condition=available deployment/railyard-yardmaster \
            -n railyard --timeout=120s

      - name: Show pod status
        if: always()
        run: kubectl get pods -n railyard -o wide

      - name: Show pod logs on failure
        if: failure()
        run: |
          for comp in mysql pgvector dashboard dispatch yardmaster engine bull; do
            echo "=== $comp ==="
            kubectl logs -l app.kubernetes.io/component=$comp -n railyard --tail=50 --all-containers 2>/dev/null || true
          done
          kubectl get events -n railyard --sort-by='.lastTimestamp' | tail -30 || true

  release:
    name: Release
    needs: [test, helm-validate]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="${GITHUB_SHA::8}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w -X main.Version=${VERSION} -X main.Commit=${COMMIT} -X main.Date=${DATE}"
          OUTPUT="ry-${VERSION}-${GOOS}-${GOARCH}"
          if [ "$GOOS" = "windows" ]; then OUTPUT="${OUTPUT}.exe"; fi
          go build -ldflags "${LDFLAGS}" -o "${OUTPUT}" ./cmd/ry/
          tar czf "${OUTPUT}.tar.gz" "${OUTPUT}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ry-${{ matrix.goos }}-${{ matrix.goarch }}
          path: "*.tar.gz"

  publish:
    name: Publish Release
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME}"

          # Find previous tag.
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v' | sed -n '2p')

          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          # Collect commits grouped by type.
          {
            echo "## What's Changed"
            echo ""

            # Features
            FEATURES=$(git log "$RANGE" --pretty=format:"%s (%h)" --grep="^[Aa]dd " --grep="^[Ff]eat" --grep="^[Nn]ew " | head -50)
            if [ -n "$FEATURES" ]; then
              echo "### Features"
              echo "$FEATURES" | sed 's/^/- /'
              echo ""
            fi

            # Fixes
            FIXES=$(git log "$RANGE" --pretty=format:"%s (%h)" --grep="^[Ff]ix" | head -50)
            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo "$FIXES" | sed 's/^/- /'
              echo ""
            fi

            # All other commits
            OTHER=$(git log "$RANGE" --pretty=format:"%s (%h)" --invert-grep --grep="^[Aa]dd " --grep="^[Ff]eat" --grep="^[Nn]ew " --grep="^[Ff]ix" | head -50)
            if [ -n "$OTHER" ]; then
              echo "### Other Changes"
              echo "$OTHER" | sed 's/^/- /'
              echo ""
            fi

            echo "---"
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${VERSION}"
          } > changelog.md

          cat changelog.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create the release if it doesn't already exist.
          if ! gh release view "$GITHUB_REF_NAME" > /dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file changelog.md \
              artifacts/*
          else
            echo "Release $GITHUB_REF_NAME already exists, uploading artifacts..."
            gh release upload "$GITHUB_REF_NAME" artifacts/* --clobber
          fi

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL not set, skipping"
            exit 0
          fi

          VERSION="${GITHUB_REF_NAME}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${VERSION}"

          # Truncate changelog for Discord (2000 char embed description limit).
          CHANGELOG=$(head -c 1800 changelog.md)

          PAYLOAD=$(jq -n \
            --arg title "Railyard ${VERSION} Released" \
            --arg url "$RELEASE_URL" \
            --arg desc "$CHANGELOG" \
            '{
              embeds: [{
                title: $title,
                url: $url,
                description: $desc,
                color: 5814783
              }]
            }')

          curl -sf -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL"
