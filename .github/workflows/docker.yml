name: Docker

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-base:
    name: Build Base Stages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build ry binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "\
            -X main.Version=${GITHUB_REF_NAME#v} \
            -X main.Commit=$(git rev-parse --short HEAD) \
            -X main.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o ry ./cmd/ry/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and cache the base-cocoindex stage. This is the expensive step
      # (~20 min for sentence-transformers/PyTorch). All provider builds
      # reuse these cached layers.
      - name: Build and cache base-cocoindex stage
        uses: docker/build-push-action@v6
        with:
          file: Dockerfile.engine
          context: .
          push: false
          platforms: linux/amd64
          target: base-cocoindex
          cache-from: type=gha,scope=base-cocoindex
          cache-to: type=gha,mode=min,scope=base-cocoindex

  build-providers:
    name: Build ${{ matrix.provider }}
    needs: build-base
    runs-on: ubuntu-latest
    strategy:
      matrix:
        provider: [claude, codex, gemini, opencode, copilot]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build ry binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "\
            -X main.Version=${GITHUB_REF_NAME#v} \
            -X main.Commit=$(git rev-parse --short HEAD) \
            -X main.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o ry ./cmd/ry/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/engine
          tags: |
            type=semver,pattern={{version}},suffix=-${{ matrix.provider }}
            type=semver,pattern={{major}}.{{minor}},suffix=-${{ matrix.provider }}
            type=sha,suffix=-${{ matrix.provider }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          file: Dockerfile.engine
          context: .
          push: true
          platforms: linux/amd64
          target: final
          build-args: |
            AGENT_PROVIDER=${{ matrix.provider }}
            COCOINDEX_BASE=with-cocoindex
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=base-cocoindex
            type=gha,scope=${{ matrix.provider }}
          cache-to: type=gha,mode=min,scope=${{ matrix.provider }}

  # Tag the claude variant as the default (latest + unqualified semver).
  tag-default:
    name: Tag Default (claude)
    needs: build-providers
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install crane
        run: |
          curl -sSL https://github.com/google/go-containerregistry/releases/download/v0.20.3/go-containerregistry_Linux_x86_64.tar.gz \
            | tar xz -C /usr/local/bin crane

      - name: Create default tags from claude variant
        run: |
          IMAGE="ghcr.io/${{ github.repository }}/engine"
          VERSION="${GITHUB_REF_NAME#v}"
          MAJOR_MINOR="${VERSION%.*}"

          # Copy claude-suffixed tags to unqualified defaults.
          crane copy "${IMAGE}:${VERSION}-claude" "${IMAGE}:${VERSION}"
          crane copy "${IMAGE}:${VERSION}-claude" "${IMAGE}:${MAJOR_MINOR}"
          crane copy "${IMAGE}:${VERSION}-claude" "${IMAGE}:latest"

  # Clean up old image versions — keep 0.8.10+ and untagged manifests.
  cleanup-images:
    name: Cleanup Old Images
    needs: tag-default
    runs-on: ubuntu-latest
    steps:
      - name: Delete pre-0.8.10 image versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # List all versions with their tags.
          gh api --paginate \
            /user/packages/container/railyard%2Fengine/versions \
            --jq '.[] | select(.metadata.container.tags | length > 0) | {id, tags: .metadata.container.tags}' \
          | jq -s '.' > /tmp/versions.json

          # Find versions where ALL tags match pre-0.8.10 patterns.
          # Keep: 0.8.10+, latest, any 0.9+/1.0+ tags.
          jq -r '.[] | select(
            .tags | all(
              test("^0\\.8\\.[0-9]-|^0\\.8\\.[0-9]$|^sha-|^0\\.[0-7]\\.|nococoindex")
            )
          ) | .id' /tmp/versions.json > /tmp/to_delete.txt

          COUNT=$(wc -l < /tmp/to_delete.txt)
          echo "Found ${COUNT} old version(s) to delete"

          while read -r VERSION_ID; do
            echo "Deleting version ${VERSION_ID}..."
            gh api --method DELETE \
              /user/packages/container/railyard%2Fengine/versions/${VERSION_ID} \
              || echo "  Warning: failed to delete ${VERSION_ID}"
          done < /tmp/to_delete.txt
