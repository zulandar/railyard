name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test
    needs: [lint, helm-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -count=1 -timeout 300s -race

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  govulncheck:
    name: Vulnerability Check
    needs: [lint, helm-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Helm lint (default values)
        run: helm lint charts/railyard

      - name: Helm lint (minimal)
        run: helm lint charts/railyard -f charts/railyard/ci/test-values-minimal.yaml

      - name: Helm lint (external DB)
        run: helm lint charts/railyard -f charts/railyard/ci/test-values-external-db.yaml

      - name: Helm lint (full)
        run: helm lint charts/railyard -f charts/railyard/ci/test-values-full.yaml

      - name: Helm lint (copilot)
        run: helm lint charts/railyard -f charts/railyard/ci/test-values-copilot.yaml

      - name: Helm lint (existingSecret)
        run: helm lint charts/railyard -f charts/railyard/ci/test-values-existing-secret.yaml

      - name: Helm template (default values)
        run: helm template railyard charts/railyard > /dev/null

      - name: Helm template (full)
        run: helm template railyard charts/railyard -f charts/railyard/ci/test-values-full.yaml > /dev/null

      - name: Helm template (Kind CI)
        run: helm template railyard charts/railyard -f charts/railyard/ci/test-values-kind.yaml > /dev/null

      - name: Helm template (copilot)
        run: helm template railyard charts/railyard -f charts/railyard/ci/test-values-copilot.yaml > /dev/null

      - name: Helm template (existingSecret)
        run: helm template railyard charts/railyard -f charts/railyard/ci/test-values-existing-secret.yaml > /dev/null

      - name: Verify copilot auth-secret renders both tokens separately
        run: |
          OUTPUT=$(helm template railyard charts/railyard \
            -f charts/railyard/ci/test-values-copilot.yaml \
            -s templates/auth-secret.yaml)
          echo "$OUTPUT"
          # GH_TOKEN must come from githubToken (repo-scoped), not copilot.token
          echo "$OUTPUT" | grep -q 'GH_TOKEN: "ghp-fallback-token"' \
            || { echo "FAIL: GH_TOKEN should be ghp-fallback-token (from githubToken)"; exit 1; }
          # GITHUB_COPILOT_TOKEN must be set separately
          echo "$OUTPUT" | grep -q 'GITHUB_COPILOT_TOKEN: "ghp-copilot-specific-token"' \
            || { echo "FAIL: GITHUB_COPILOT_TOKEN should be ghp-copilot-specific-token"; exit 1; }
          echo "PASS: copilot auth-secret renders both tokens correctly"

      - name: Verify githubToken-only setup does not emit GITHUB_COPILOT_TOKEN
        run: |
          OUTPUT=$(helm template railyard charts/railyard \
            --set git.owner=test --set git.repo=test \
            --set auth.githubToken=ghp-repo-only \
            --set engine.agentProvider=copilot \
            -s templates/auth-secret.yaml)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q 'GH_TOKEN: "ghp-repo-only"' \
            || { echo "FAIL: GH_TOKEN should be ghp-repo-only"; exit 1; }
          if echo "$OUTPUT" | grep -q 'GITHUB_COPILOT_TOKEN'; then
            echo "FAIL: GITHUB_COPILOT_TOKEN should not be present when copilot.token is empty"
            exit 1
          fi
          echo "PASS: githubToken-only setup renders correctly"

      - name: Verify GITHUB_TOKEN renders with inline githubToken
        run: |
          DEPLOYMENTS="bull-deployment telegraph-deployment dispatch-deployment engine-deployment"
          for TMPL in $DEPLOYMENTS; do
            OUTPUT=$(helm template railyard charts/railyard \
              -f charts/railyard/ci/test-values-full.yaml \
              -s "templates/${TMPL}.yaml")
            echo "$OUTPUT" | grep -q 'GITHUB_TOKEN' \
              || { echo "FAIL: ${TMPL} should have GITHUB_TOKEN when githubToken is set"; exit 1; }
            echo "$OUTPUT" | grep -q 'name: railyard-auth' \
              || { echo "FAIL: ${TMPL} GITHUB_TOKEN should reference railyard-auth"; exit 1; }
          done
          echo "PASS: GITHUB_TOKEN present in all deployments with inline githubToken"

      - name: Verify GITHUB_TOKEN renders with auth.existingSecret
        run: |
          DEPLOYMENTS="bull-deployment telegraph-deployment dispatch-deployment engine-deployment"
          for TMPL in $DEPLOYMENTS; do
            OUTPUT=$(helm template railyard charts/railyard \
              -f charts/railyard/ci/test-values-existing-secret.yaml \
              -s "templates/${TMPL}.yaml")
            echo "$OUTPUT" | grep -q 'GITHUB_TOKEN' \
              || { echo "FAIL: ${TMPL} should have GITHUB_TOKEN when existingSecret is set"; exit 1; }
            echo "$OUTPUT" | grep -q 'name: my-external-secret' \
              || { echo "FAIL: ${TMPL} GITHUB_TOKEN should reference my-external-secret"; exit 1; }
          done
          echo "PASS: GITHUB_TOKEN present and references existingSecret in all deployments"

      - name: Verify GITHUB_TOKEN absent when no token configured
        run: |
          DEPLOYMENTS="bull-deployment telegraph-deployment dispatch-deployment engine-deployment"
          for TMPL in $DEPLOYMENTS; do
            OUTPUT=$(helm template railyard charts/railyard \
              -s "templates/${TMPL}.yaml" 2>/dev/null) || true
            if echo "$OUTPUT" | grep -q 'GITHUB_TOKEN'; then
              echo "FAIL: ${TMPL} should NOT have GITHUB_TOKEN when no token is configured"
              exit 1
            fi
          done
          echo "PASS: GITHUB_TOKEN absent from all deployments when no token configured"

      - name: Verify no auth-secret created when existingSecret is set
        run: |
          OUTPUT=$(helm template railyard charts/railyard \
            -f charts/railyard/ci/test-values-existing-secret.yaml \
            -s templates/auth-secret.yaml 2>&1) || true
          if echo "$OUTPUT" | grep -q 'kind: Secret'; then
            echo "FAIL: auth-secret should not be created when existingSecret is set"
            exit 1
          fi
          echo "PASS: auth-secret correctly skipped with existingSecret"

  docker-build:
    name: Docker Build Smoke Test
    needs: [lint, helm-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build ry binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ry ./cmd/ry/

      - name: Build Docker image (claude)
        run: docker build --build-arg AGENT_PROVIDER=claude -f Dockerfile.engine .
