name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -count=1 -timeout 300s -race

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  govulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Helm lint (default values)
        run: helm lint charts/railyard

      - name: Helm lint (minimal)
        run: helm lint charts/railyard -f charts/railyard/ci/test-values-minimal.yaml

      - name: Helm lint (external DB)
        run: helm lint charts/railyard -f charts/railyard/ci/test-values-external-db.yaml

      - name: Helm lint (full)
        run: helm lint charts/railyard -f charts/railyard/ci/test-values-full.yaml

      - name: Helm template (default values)
        run: helm template railyard charts/railyard > /dev/null

      - name: Helm template (full)
        run: helm template railyard charts/railyard -f charts/railyard/ci/test-values-full.yaml > /dev/null
