name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test
    needs: [lint, helm-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -count=1 -timeout 300s -race

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  govulncheck:
    name: Vulnerability Check
    needs: [lint, helm-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Helm lint (default values)
        run: helm lint charts/railyard

      - name: Helm lint (minimal)
        run: helm lint charts/railyard -f charts/railyard/ci/test-values-minimal.yaml

      - name: Helm lint (external DB)
        run: helm lint charts/railyard -f charts/railyard/ci/test-values-external-db.yaml

      - name: Helm lint (full)
        run: helm lint charts/railyard -f charts/railyard/ci/test-values-full.yaml

      - name: Helm lint (copilot)
        run: helm lint charts/railyard -f charts/railyard/ci/test-values-copilot.yaml

      - name: Helm template (default values)
        run: helm template railyard charts/railyard > /dev/null

      - name: Helm template (full)
        run: helm template railyard charts/railyard -f charts/railyard/ci/test-values-full.yaml > /dev/null

      - name: Helm template (Kind CI)
        run: helm template railyard charts/railyard -f charts/railyard/ci/test-values-kind.yaml > /dev/null

      - name: Helm template (copilot)
        run: helm template railyard charts/railyard -f charts/railyard/ci/test-values-copilot.yaml > /dev/null

      - name: Verify copilot auth-secret renders both tokens separately
        run: |
          OUTPUT=$(helm template railyard charts/railyard \
            -f charts/railyard/ci/test-values-copilot.yaml \
            -s templates/auth-secret.yaml)
          echo "$OUTPUT"
          # GH_TOKEN must come from githubToken (repo-scoped), not copilot.token
          echo "$OUTPUT" | grep -q 'GH_TOKEN: "ghp-fallback-token"' \
            || { echo "FAIL: GH_TOKEN should be ghp-fallback-token (from githubToken)"; exit 1; }
          # GITHUB_COPILOT_TOKEN must be set separately
          echo "$OUTPUT" | grep -q 'GITHUB_COPILOT_TOKEN: "ghp-copilot-specific-token"' \
            || { echo "FAIL: GITHUB_COPILOT_TOKEN should be ghp-copilot-specific-token"; exit 1; }
          echo "PASS: copilot auth-secret renders both tokens correctly"

      - name: Verify githubToken-only setup does not emit GITHUB_COPILOT_TOKEN
        run: |
          OUTPUT=$(helm template railyard charts/railyard \
            --set git.owner=test --set git.repo=test \
            --set auth.githubToken=ghp-repo-only \
            --set engine.agentProvider=copilot \
            -s templates/auth-secret.yaml)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q 'GH_TOKEN: "ghp-repo-only"' \
            || { echo "FAIL: GH_TOKEN should be ghp-repo-only"; exit 1; }
          if echo "$OUTPUT" | grep -q 'GITHUB_COPILOT_TOKEN'; then
            echo "FAIL: GITHUB_COPILOT_TOKEN should not be present when copilot.token is empty"
            exit 1
          fi
          echo "PASS: githubToken-only setup renders correctly"

  docker-build:
    name: Docker Build Smoke Test
    needs: [lint, helm-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build ry binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ry ./cmd/ry/

      - name: Build Docker image (claude)
        run: docker build --build-arg AGENT_PROVIDER=claude -f Dockerfile.engine .
