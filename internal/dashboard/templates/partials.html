{{define "page_head"}}
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/static/style.css">
<script src="/static/htmx.min.js"></script>
{{end}}

{{define "page_nav"}}
<nav>
    <div class="container">
        <span class="brand">Railyard{{if .ProjectName}} <span class="badge badge-project">{{.ProjectName}}</span>{{end}}</span>
        <a href="/" {{if eq .NavPath "/"}}class="active"{{end}}>Dashboard</a>
        <a href="/cars" {{if hasPrefix .NavPath "/cars"}}class="active"{{end}}>Cars</a>
        <a href="/messages" {{if hasPrefix .NavPath "/messages"}}class="active"{{end}}>Messages</a>
        <a href="/logs" {{if hasPrefix .NavPath "/logs"}}class="active"{{end}}>Logs</a>
        <a href="/sessions" {{if hasPrefix .NavPath "/sessions"}}class="active"{{end}}>Sessions</a>
    </div>
</nav>
{{end}}
