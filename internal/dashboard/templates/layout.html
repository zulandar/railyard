<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{block "title" .}}Railyard Dashboard{{end}}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/htmx.min.js"></script>
</head>
<body>
    <nav>
        <div class="container">
            <span class="brand">Railyard</span>
            <a href="/" {{if eq .NavPath "/"}}class="active"{{end}}>Dashboard</a>
            <a href="/cars" {{if hasPrefix .NavPath "/cars"}}class="active"{{end}}>Cars</a>
            <a href="/messages" {{if hasPrefix .NavPath "/messages"}}class="active"{{end}}>Messages</a>
            <a href="/logs" {{if hasPrefix .NavPath "/logs"}}class="active"{{end}}>Logs</a>
            <a href="/sessions" {{if hasPrefix .NavPath "/sessions"}}class="active"{{end}}>Sessions</a>
        </div>
    </nav>
    <div class="container">
        <div id="alert-banner"></div>
        {{block "content" .}}{{end}}
    </div>
    <script src="/static/chart.min.js"></script>
    <script src="/static/sse.js"></script>
    <script src="/static/autosubmit.js"></script>
</body>
</html>
