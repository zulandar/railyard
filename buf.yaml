# buf workspace configuration for the railyard plugin gRPC contract.
#
# Layout: protos live under pkg/plugin/proto/v1/ alongside their
# generated Go stubs. The breaking-change baseline is the last-merged
# contract on the main branch (`buf breaking --against '.git#ref=refs/remotes/origin/main'`),
# not a committed snapshot. Run `scripts/proto.sh` from the repo root to
# regenerate the Go stubs after editing the .proto.
version: v2

modules:
  - path: pkg/plugin/proto/v1
    name: buf.build/zulandar/railyard-plugin

# `buf breaking` compares the live module against the same module as it
# exists on the main branch (a git ref). Because the baseline is the
# last-merged commit and not an in-tree file, a wire-incompatible change
# cannot be hidden by editing proto and baseline together in one commit.
# See docs/plugins/proto.md.

lint:
  use:
    - STANDARD

  except:
    # The single .proto lives at pkg/plugin/proto/v1/plugin.proto so the
    # Go stubs sit next to it. buf's STANDARD lint wants the directory
    # to mirror the package (railyard/plugin/v1); we keep the simpler
    # layout instead.
    - PACKAGE_DIRECTORY_MATCH
    # HostService.Subscribe returns a stream of `Event` rather than
    # `SubscribeResponse` because the message itself is the
    # multiplexed event envelope. The streaming semantics make the
    # `*Response` suffix actively misleading.
    - RPC_RESPONSE_STANDARD_NAME

breaking:
  use:
    - FILE

  ignore_unstable_packages: false
